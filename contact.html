<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delldai · Contact</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <svg xmlns="http://www.w3.org/2000/svg" style="display: none;">
        <symbol id="icon-instagram" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><circle cx="12" cy="12" r="5"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>
        </symbol>
        <symbol id="icon-wechat" viewBox="-2 0 28 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8.691 2.188C3.891 2.188 0 5.476 0 9.53c0 2.212 1.17 4.203 3.002 5.55a.59.59 0 0 1 .213.665l-.39 1.48c-.019.07-.048.141-.048.213 0 .163.13.295.29.295a.326.326 0 0 0 .167-.054l1.903-1.114a.864.864 0 0 1 .717-.098 10.16 10.16 0 0 0 2.837.403c.276 0 .543-.027.811-.05-.857-2.578.157-4.972 1.932-6.446 1.703-1.415 3.882-1.98 5.853-1.838-.576-3.583-4.196-6.348-8.596-6.348zM5.785 5.991c.642 0 1.162.529 1.162 1.18a1.17 1.17 0 0 1-1.162 1.178A1.17 1.17 0 0 1 4.623 7.17c0-.651.52-1.18 1.162-1.18zm5.813 0c.642 0 1.162.529 1.162 1.18a1.17 1.17 0 0 1-1.162 1.178 1.17 1.17 0 0 1-1.162-1.178c0-.651.52-1.18 1.162-1.18zm5.34 2.867c-1.797-.052-3.746.512-5.28 1.786-1.72 1.428-2.687 3.72-1.78 6.22.942 2.453 3.666 4.229 6.884 4.229.826 0 1.622-.12 2.361-.336a.722.722 0 0 1 .598.082l1.584.926a.272.272 0 0 0 .14.047c.134 0 .24-.111.24-.247 0-.06-.023-.12-.038-.177l-.327-1.233a.582.582 0 0 1-.023-.156.49.49 0 0 1 .201-.398C23.024 18.48 24 16.82 24 14.98c0-3.21-2.931-5.952-7.062-6.122zm-2.18 2.769c.535 0 .969.44.969.982a.976.976 0 0 1-.969.983.976.976 0 0 1-.969-.983c0-.542.434-.982.97-.982zm4.844 0c.535 0 .969.44.969.982a.976.976 0 0 1-.969.983.976.976 0 0 1-.969-.983c0-.542.434-.982.969-.982z"/>
        </symbol>
        <symbol id="icon-email" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="4" width="20" height="16" rx="2"/><polyline points="2 6 12 14 22 6"/>
        </symbol>
    </svg>

    <header class="site-header" id="header">
        <div class="header-inner">
            <a href="index.html" class="logo">Delldai</a>
            <button class="nav-toggle" id="navToggle" aria-label="Toggle menu" aria-expanded="false"><span></span><span></span><span></span></button>
            <nav class="main-nav" id="mainNav">
                <ul>
                    <li><a href="index.html" data-i18n="home">Home</a></li>
                    <li><a href="works.html" data-i18n="works">Works</a></li>
                    <li><a href="bio.html" data-i18n="bio">BIO</a></li>
                    <li><a href="store.html" data-i18n="store">Store</a></li>
                    <li><a href="course.html" data-i18n="course">Course</a></li>
                    <li><a href="contact.html" class="nav-active" data-i18n="contact">Contact</a></li>
                </ul>
            </nav>
            <button class="lang-switch" id="langSwitch">中文</button>
        </div>
    </header>

    <main>
        <div class="section fade-in">
            <div class="section-header">
                <h2 class="title-font" data-i18n="contact-title">Stay in Touch</h2>
                <p data-i18n="contact-subtitle">For exhibitions, commissions, or a quiet conversation about art</p>
                <p class="contact-sub-note" data-i18n="contact-note">Brand cooperation & others, Please fill in the form</p>
            </div>
            <form id="contactForm" class="contact-form" action="https://formsubmit.co/delldai@qq.com" method="POST">
                <input type="hidden" name="_subject" value="New message from Dell Portfolio">
                <input type="text" name="name" data-i18n="name-placeholder" placeholder="Your name" required>
                <input type="email" name="email" data-i18n="email-placeholder" placeholder="Email" required>
                <textarea name="message" data-i18n="message-placeholder" placeholder="Message" required></textarea>
                <button type="submit" data-i18n="send-btn">Send</button>
            </form>
            <div class="social-links">
                <a href="https://www.instagram.com/yueqiangdelligsh=ZHI1MTZ6NnhwZWZr&utm_source=qr" target="_blank" rel="noopener noreferrer" class="instagram-link" aria-label="Instagram">
                    <svg width="40" height="40" class="social-icon"><use href="#icon-instagram"/></svg>
                    <span class="wechat-tooltip"><img src="assets/instagram-code.png" alt="Instagram QR"></span>
                </a>
                <a href="#" class="wechat-link" aria-label="WeChat">
                    <svg width="40" height="40" class="social-icon"><use href="#icon-wechat"/></svg>
                    <span class="wechat-tooltip"><img src="assets/wechat-code.jpg" alt="WeChat QR"></span>
                </a>
                <a href="mailto:delldai@qq.com" aria-label="Email">
                    <svg width="40" height="40" class="social-icon"><use href="#icon-email"/></svg>
                </a>
            </div>
        </div>
        <div class="site-footer">
            <p data-i18n="footer">&copy; 2026 Delldai. All rights reserved.</p>
        </div>
    </main>

    <div class="back-to-top" id="backToTop" title="Back to top">
        <svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg>
    </div>
    <div class="nav-overlay" id="navOverlay"></div>
    <div class="toast" id="toast"></div>
    <script src="script.js"></script>
</body>
</html>
