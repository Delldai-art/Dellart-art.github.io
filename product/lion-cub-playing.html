<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lion Cub Playing · Delldai Store</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <style>
        .product-detail {
            max-width: var(--max-width);
            margin: 7rem auto 4rem;
            padding: 0 2.5rem;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: start;
        }
        .gallery {
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .main-image-wrapper {
            position: relative;
            overflow: hidden;
            border-radius: 0;
        }
        /* 滑动轨道 */
        .slides {
            display: flex;
            transition: transform 0.45s ease;
            will-change: transform;
        }
        .slides img {
            width: 100%;
            flex-shrink: 0;
            aspect-ratio: 4 / 3;
            object-fit: cover;
            display: block;
            border-radius: 0;
        }
        /* 箭头增大 */
        .arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.55);
            backdrop-filter: blur(10px);
            border: none;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 10;
            color: #2b2b2b;
            font-size: 2rem;
            font-weight: 300;
            transition: background 0.3s;
        }
        .arrow:hover { background: rgba(255,255,255,0.8); }
        .arrow.left { left: 1rem; }
        .arrow.right { right: 1rem; }

        .thumbnails {
            display: flex;
            gap: 0.8rem;
            overflow-x: auto;
        }
        .thumbnails img {
            width: 70px;
            height: 55px;
            object-fit: cover;
            border-radius: 0;
            cursor: pointer;
            border: 2px solid transparent;
            transition: border-color 0.3s;
            flex-shrink: 0;
        }
        .thumbnails img.active { border-color: var(--accent); }

        .product-info {
            display: flex;
            flex-direction: column;
            gap: 1.2rem;
        }
        .product-info h1 {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 300;
            font-size: 2.6rem;
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
        }
        .product-info .price {
            font-family: 'Inter', sans-serif;
            font-size: 1.6rem;
            font-weight: 400;
            color: var(--accent);
            margin-bottom: 1rem;
        }
        .product-info .description {
            font-family: 'Inter', sans-serif;
            color: var(--text-secondary);
            font-weight: 300;
            line-height: 1.8;
            margin-bottom: 1.5rem;
        }
        .btn {
            display: inline-block;
            padding: 0.9rem 2.5rem;
            border: 1px solid var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            font-weight: 400;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text);
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            border-radius: 2px;
            background: transparent;
            align-self: flex-start;
        }
        .btn:hover { background: var(--text); color: #fff; }
        .btn.primary { background: var(--text); color: #fff; }
        .btn.primary:hover { background: transparent; color: var(--text); }

        @media (max-width: 768px) {
            .product-detail {
                grid-template-columns: 1fr; gap: 2rem;
                padding: 2rem 1.5rem; margin-top: var(--header-height);
            }
            .arrow { width: 44px; height: 44px; font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <header class="site-header" id="header">
        <div class="header-inner">
            <a href="../index.html" class="logo">Delldai</a>
            <button class="nav-toggle" id="navToggle" aria-label="Toggle menu" aria-expanded="false"><span></span><span></span><span></span></button>
            <nav class="main-nav" id="mainNav">
                <ul>
                    <li><a href="../index.html" data-i18n="home">Home</a></li>
                    <li><a href="../works.html" data-i18n="works">Works</a></li>
                    <li><a href="../bio.html" data-i18n="bio">BIO</a></li>
                    <li><a href="../store.html" class="nav-active" data-i18n="store">Store</a></li>
                    <li><a href="../course.html" data-i18n="course">Course</a></li>
                    <li><a href="../contact.html" data-i18n="contact">Contact</a></li>
                </ul>
            </nav>
            <button class="lang-switch" id="langSwitch">中文</button>
        </div>
    </header>

    <main>
        <div class="product-detail fade-in">
            <div class="gallery">
                <div class="main-image-wrapper">
                    <div class="slides" id="slides">
                        <img src="lion-cub-playing.jpg" alt="Lion cub playing">
                        <img src="lion-cub-playing1.jpg" alt="Lion cub playing 1">
                        <img src="lion-cub-playing2.jpg" alt="Lion cub playing 2">
                        <img src="lion-cub-playing3.jpg" alt="Lion cub playing 3">
                        <img src="lion-cub-playing4.jpg" alt="Lion cub playing 4">
                    </div>
                    <button class="arrow left" onclick="prevSlide()" aria-label="Previous">‹</button>
                    <button class="arrow right" onclick="nextSlide()" aria-label="Next">›</button>
                </div>
                <div class="thumbnails" id="thumbnails">
                    <img src="lion-cub-playing.jpg" class="active" onclick="goToSlide(0)">
                    <img src="lion-cub-playing1.jpg" onclick="goToSlide(1)">
                    <img src="lion-cub-playing2.jpg" onclick="goToSlide(2)">
                    <img src="lion-cub-playing3.jpg" onclick="goToSlide(3)">
                    <img src="lion-cub-playing4.jpg" onclick="goToSlide(4)">
                </div>
            </div>
            <div class="product-info">
                <h1 data-i18n="product-title">Lion Cub Playing</h1>
                <div class="price" data-i18n="product-price">$29.00</div>
                <p class="description" data-i18n="product-desc">
                    This digital 3D model captures a playful lion cub in exquisite detail.
                    Includes high-resolution textures and rigging. Perfect for your animations
                    or render projects.
                </p>
                <a href="#" class="btn primary" data-i18n="buy-now">Buy Now</a>
            </div>
        </div>
    </main>

    <div class="back-to-top" id="backToTop" title="Back to top">
        <svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg>
    </div>
    <div class="nav-overlay" id="navOverlay"></div>

    <script>
        const slides = document.getElementById('slides');
        const thumbImages = document.querySelectorAll('#thumbnails img');
        let currentIndex = 0;
        const totalSlides = thumbImages.length;

        function updateActiveThumb() {
            thumbImages.forEach((img, i) => {
                img.classList.toggle('active', i === currentIndex);
            });
        }

        function goToSlide(index) {
            if (index < 0 || index >= totalSlides) return;
            currentIndex = index;
            slides.style.transform = `translateX(-${currentIndex * 100}%)`;
            updateActiveThumb();
        }

        function nextSlide() {
            currentIndex = (currentIndex + 1) % totalSlides;
            goToSlide(currentIndex);
        }

        function prevSlide() {
            currentIndex = (currentIndex - 1 + totalSlides) % totalSlides;
            goToSlide(currentIndex);
        }

        // 键盘控制
        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowLeft') prevSlide();
            if (e.key === 'ArrowRight') nextSlide();
        });

        // 初始位置
        goToSlide(0);
    </script>
    <script src="../script.js"></script>
</body>
</html>
