<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delldai · Store</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .section-header { margin-bottom: 3rem; }

        .masonry {
            column-count: 2;
            column-gap: 1.8rem;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2.5rem;
        }
        .store-item {
            display: inline-block;
            width: 100%;
            margin-bottom: 1.8rem;
            position: relative;
            overflow: hidden;
            /* 移除圆角 */
            border-radius: 0;
            cursor: pointer;
            transition: transform 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            background: #f0ece8;
            break-inside: avoid;
        }
        .store-item:hover {
            transform: scale(1.03);
        }
        /* 不等高 */
        .store-item:nth-child(1) { aspect-ratio: 3 / 4; }
        .store-item:nth-child(2) { aspect-ratio: 4 / 5; }
        .store-item:nth-child(3) { aspect-ratio: 1 / 1; }
        .store-item:nth-child(4) { aspect-ratio: 4 / 3; }
        .store-item:nth-child(5) { aspect-ratio: 3 / 4; }
        .store-item:nth-child(6) { aspect-ratio: 16 / 10; }

        .store-item img {
            width: 100%; height: 100%; object-fit: cover; display: block;
            transition: filter 0.35s ease;
        }
        .store-placeholder {
            width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
            font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; color: #8b8178;
            letter-spacing: 2px; background: var(--placeholder, #e3ded8);
        }
        .store-overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.25);
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.35s ease; pointer-events: none;
        }
        .store-item:hover .store-overlay { opacity: 1; }
        .store-item:hover img { filter: blur(6px); }
        .store-overlay span {
            background: rgba(255,255,255,0.9); color: #2b2b2b;
            font-family: 'Inter', sans-serif; font-size: 0.8rem; font-weight: 500;
            letter-spacing: 2px; text-transform: uppercase; padding: 0.6rem 1.8rem; border-radius: 2px;
        }

        @media (max-width: 768px) {
            .masonry { column-count: 1; padding: 0 1.5rem; }
        }
        @media (max-width: 480px) {
            .masonry { padding: 0 1rem; }
        }
    </style>
</head>
<body>
    <header class="site-header" id="header">
        <div class="header-inner">
            <a href="index.html" class="logo">Delldai</a>
            <button class="nav-toggle" id="navToggle" aria-label="Toggle menu" aria-expanded="false"><span></span><span></span><span></span></button>
            <nav class="main-nav" id="mainNav">
                <ul>
                    <li><a href="index.html" data-i18n="home">Home</a></li>
                    <li><a href="works.html" data-i18n="works">Works</a></li>
                    <li><a href="bio.html" data-i18n="bio">BIO</a></li>
                    <li><a href="store.html" class="nav-active" data-i18n="store">Store</a></li>
                    <li><a href="course.html" data-i18n="course">Course</a></li>
                    <li><a href="contact.html" data-i18n="contact">Contact</a></li>
                </ul>
            </nav>
            <button class="lang-switch" id="langSwitch">中文</button>
        </div>
    </header>

    <main>
        <div class="section fade-in">
            <div class="section-header">
                <h2 class="title-font" data-i18n="store-title">Store</h2>
                <p data-i18n="store-subtitle">Digital assets & fine art prints</p>
            </div>

            <div class="masonry">
                <a href="product/lion-cub-playing.html" class="store-item">
                    <img src="product/lion-cub-playing.jpg" alt="Lion cub playing">
                    <div class="store-overlay"><span data-i18n="view-details">View Details</span></div>
                </a>
                <div class="store-item" style="--placeholder:#e0d9d1;"><div class="store-placeholder">Coming Soon</div></div>
                <div class="store-item" style="--placeholder:#dde4e6;"><div class="store-placeholder">Coming Soon</div></div>
                <div class="store-item" style="--placeholder:#e5dfd7;"><div class="store-placeholder">Coming Soon</div></div>
                <div class="store-item" style="--placeholder:#ede4db;"><div class="store-placeholder">Coming Soon</div></div>
                <div class="store-item" style="--placeholder:#f0ece8;"><div class="store-placeholder">Coming Soon</div></div>
            </div>
        </div>
    </main>

    <div class="back-to-top" id="backToTop" title="Back to top">
        <svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg>
    </div>
    <div class="nav-overlay" id="navOverlay"></div>
    <script src="script.js"></script>
</body>
</html>
