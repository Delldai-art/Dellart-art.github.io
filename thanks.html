<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You · Dell</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #faf7f4;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
            color: #2b2b2b;
            text-align: center;
            padding: 2rem;
        }
        h1 {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-weight: 300;
            font-size: 2.8rem;
            letter-spacing: 3px;
            margin-bottom: 1.5rem;
        }
        p {
            font-weight: 300;
            color: #5c5c5c;
            margin-bottom: 2.5rem;
            line-height: 1.8;
        }
        a {
            display: inline-block;
            padding: 0.8rem 2.5rem;
            border: 1px solid #2b2b2b;
            font-family: 'Inter', sans-serif;
            font-size: 0.8rem;
            font-weight: 400;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #2b2b2b;
            text-decoration: none;
            transition: background 0.3s, color 0.3s;
        }
        a:hover { background: #2b2b2b; color: #fff; }
    </style>
</head>
<body>
    <div>
        <h1>Thank You</h1>
        <p>Your message has been received.<br>I'll get back to you as soon as possible.</p>
        <a href="index.html">Back to Portfolio</a>
    </div>
</body>
</html>
